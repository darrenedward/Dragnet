services:
  dragnet:
    build: .
    image: dragnet:latest
    container_name: dragnet
    restart: unless-stopped

    # Linux-only. With host networking, `localhost` inside the container
    # IS the host — Ollama at localhost:11434 just works without
    # host.docker.internal translation. The `ports:` directive is ignored
    # in this mode (port 3300 is on the host directly).
    network_mode: host

    # Project-local settings stay in .env.local. The encryption key is a
    # user-global secret shared by Dragnet containers, not a project setting.
    env_file:
      - .env.local
      - ${HOME}/.dragnet/.env

    environment:
      - NODE_ENV=production
      - PORT=3300

    volumes:
      # Runtime config: llm-presets.json
      - ./.dragnet:/app/.dragnet
      # Centralised scan state — checkpoints, reports, provider health,
      # review exports. Slice 2: replaces per-repo .dragnet/ artifacts.
      - dragnet-scan-state:/var/lib/dragnet/scans
      # Docker socket so the orchestrator can spawn alpine/git (clone
      # step) and the runner image (npm install / test / lint / build).
      # Mounted read-only so the Dragnet app can't reconfigure the host
      # Docker daemon, just talk to it.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Per-repo named volumes (dragnet-repo-<id>) are created on demand
      # by ContainerOrchestrator when GitService.syncToCommit runs.

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3300/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  dragnet-scan-state:
