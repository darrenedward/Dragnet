services:
  dragnet:
    build: .
    image: dragnet:latest
    container_name: dragnet
    restart: unless-stopped

    # Linux-only. With host networking, `localhost` inside the container
    # IS the host — Ollama at localhost:11434 just works without
    # host.docker.internal translation. The `ports:` directive is ignored
    # in this mode (port 3300 is on the host directly).
    network_mode: host

    # Reads DATABASE_URL + DRAGNET_* vars from the host's .env.local.
    env_file:
      - .env.local

    environment:
      - NODE_ENV=production
      - PORT=3300
      - REPOS_DIR=/app/repos

    volumes:
      # Runtime config: llm-presets.json
      - ./.dragnet:/app/.dragnet
      # Centralised scan state — checkpoints, reports, provider health,
      # review exports. Slice 2: replaces per-repo .dragnet/ artifacts.
      - dragnet-scan-state:/var/lib/dragnet/scans
      # Cloned repos — persists across restarts so re-scans are fast.
      - ./repos:/app/repos
      # Read-only bind-mount of the host repo directory so the container
      # can run `git diff` against repos registered with absolute host
      # paths in the database. The container-side mount point is
      # `/host-repos`; DB `path` values should be rewritten to use this
      # prefix (e.g. `/host-repos/CredManagerPro` instead of
      # `/home/curryman/Websites/CredManagerPro`).
      - /home/curryman/Websites:/host-repos:ro

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3300/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  dragnet-scan-state:
